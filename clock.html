<!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muddy's JS Live Clock</title>
    <style>
      #live-clock {
        font-size: 48px;
        font-family: 'comic sans ms', sans-serif;
        color: #2a09a0;
        text-align: center;
        margin-top: 20%;
      }
    </style>
  </head>
  <body>
      <button onclick="document.body.style.backgroundColor = 'black'">Change Background Color</button>
      <button onsecondclick="document.body.style.backgroundColor = 'white'">Reset Background Color</button>
      button-align: topcenter;

         <a href='https://github.com/ItsMuddyIceJo3e'>My Github</a>
         align: topleft;

      
        <div id = "live-clock">00:00:00</div>
          <script>
            function updateClock() {
              const now = new Date();
              const timeString = now.toLocaleTimeString('en-US', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: true,
                timeZoneName: 'short'
              });
              document.getElementById('live-clock').textContent = timeString;
            }

            // clock will update every second
            setInterval(updateClock, 1000);
            updateClock(); // initial call to display clock immediately
          </script>
  </body>
</html>
